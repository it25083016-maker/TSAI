<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>惑星吸収ゲーム</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  height:100dvh; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  touch-action:none;
}
#wrap {
  position:relative; width:100%; max-width:480px;
  height:100dvh; max-height:860px; overflow:hidden;
}
canvas { display:block; width:100%; height:100%; }

/* HUD */
#hud {
  position:absolute; top:0; left:0; right:0;
  padding:14px 16px;
  display:flex; justify-content:space-between; align-items:flex-start;
  pointer-events:none; z-index:10;
}
#barWrap { flex:1; max-width:180px; }
#barLabel { font-size:10px; letter-spacing:.12em; color:rgba(255,255,255,.4); margin-bottom:4px; }
#barTrack { height:5px; background:rgba(255,255,255,.1); border-radius:3px; overflow:hidden; }
#barFill { height:100%; width:5%; border-radius:3px; background:linear-gradient(90deg,#6cf,#c7f); transition:width .3s; }
#scoreWrap { text-align:right; }
#scoreNum { font-size:26px; font-weight:700; color:#fff; line-height:1; }
#scoreLabel { font-size:10px; letter-spacing:.12em; color:rgba(255,255,255,.35); }
#rankLabel {
  position:absolute; top:52px; left:16px;
  font-size:13px; font-weight:600; color:#6cf;
}

/* Screens */
.screen {
  position:absolute; inset:0; z-index:20;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:2rem; text-align:center;
}
#scStart { background:radial-gradient(ellipse at 50% 50%,#060618,#000 75%); }
.deco { font-size:70px; margin-bottom:16px; animation:bob 3.5s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.title { font-size:38px; font-weight:900; color:#fff; line-height:1.15; margin-bottom:6px; }
.sub { font-size:12px; letter-spacing:.2em; color:rgba(255,255,255,.35); margin-bottom:40px; }
.bigbtn {
  background:linear-gradient(135deg,#6cf,#c7f);
  border:none; color:#fff; font-size:17px; font-weight:700;
  padding:14px 48px; border-radius:999px; cursor:pointer;
  box-shadow:0 0 36px rgba(110,200,255,.4);
  font-family:inherit; margin-bottom:20px;
  transition:transform .12s;
}
.bigbtn:active { transform:scale(.96); }
.tips { font-size:13px; color:rgba(255,255,255,.3); line-height:2; }

#scOver, #scWin { background:rgba(0,0,8,.93); backdrop-filter:blur(10px); }
#scOver.hide, #scWin.hide { display:none; }
.overTitle { font-size:36px; font-weight:900; color:#f46; margin-bottom:8px; }
.winTitle  { font-size:34px; font-weight:900; color:#c7f; margin-bottom:8px; }
.overSub   { font-size:14px; color:rgba(255,255,255,.4); margin-bottom:28px; }
.bigScore  { font-size:60px; font-weight:900; color:#fff; letter-spacing:-3px; margin-bottom:6px; }
.scoreTag  { font-size:11px; letter-spacing:.18em; color:rgba(255,255,255,.35); margin-bottom:36px; }

/* Joystick */
#jZone { position:absolute; bottom:0; left:0; right:0; height:55%; z-index:5; }
#jBase {
  position:absolute; width:108px; height:108px; border-radius:50%;
  border:1.5px solid rgba(110,200,255,.2); background:rgba(110,200,255,.04);
  display:none; pointer-events:none;
}
#jKnob {
  position:absolute; width:40px; height:40px; border-radius:50%;
  background:rgba(110,200,255,.55); top:50%; left:50%;
  transform:translate(-50%,-50%); pointer-events:none;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="barWrap">
      <div id="barLabel">成長度</div>
      <div id="barTrack"><div id="barFill"></div></div>
    </div>
    <div id="scoreWrap">
      <div id="scoreNum">0</div>
      <div id="scoreLabel">スコア</div>
    </div>
  </div>
  <div id="rankLabel">🪨 隕石</div>

  <!-- Start screen -->
  <div class="screen" id="scStart">
    <div class="deco">🪐</div>
    <div class="title">宇宙の覇者<br>惑星吸収</div>
    <div class="sub">COSMIC DOMINATION</div>
    <button class="bigbtn" id="btnStart">ゲームスタート</button>
    <div class="tips">
      画面下をドラッグして移動<br>
      小さい天体を吸収して成長<br>
      大きい天体から逃げろ
    </div>
  </div>

  <!-- Game Over -->
  <div class="screen hide" id="scOver">
    <div class="overTitle">吸収された！</div>
    <div class="overSub">あなたの星は消滅しました</div>
    <div class="bigScore" id="overScore">0</div>
    <div class="scoreTag">スコア</div>
    <button class="bigbtn" id="btnRetry">もう一度</button>
  </div>

  <!-- Win -->
  <div class="screen hide" id="scWin">
    <div class="deco">🌌</div>
    <div class="winTitle">宇宙の覇者になった！</div>
    <div class="overSub">ブラックホールに進化しました！</div>
    <div class="bigScore" id="winScore">0</div>
    <div class="scoreTag">スコア</div>
    <button class="bigbtn" id="btnWin">もう一度遊ぶ</button>
  </div>

  <!-- Joystick -->
  <div id="jZone">
    <div id="jBase"><div id="jKnob"></div></div>
  </div>
</div>

<script>
// ─── Canvas setup ───────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('wrap');
let W = 0, H = 0;
function resize() {
  W = canvas.width  = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Constants ──────────────────────────────────────────────────────
const MAX_BODIES   = 40;   // target body count
const SPAWN_SMALL  = 6;    // weight for tiny bodies
const WORLD_BOUND  = 950;
const PLAYER_START_SIZE = 16;
const PLAYER_MAX_SIZE   = 110;

// ─── State ──────────────────────────────────────────────────────────
let mode   = 'start';  // start | play | over | win
let score  = 0;
let frame  = 0;
let camX   = 0, camY = 0;

// ─── Stars (background, parallax) ───────────────────────────────────
const STARS = Array.from({length:180}, () => ({
  x  : Math.random()*4000 - 2000,
  y  : Math.random()*4000 - 2000,
  r  : 0.3 + Math.random()*1.4,
  a  : 0.2 + Math.random()*0.8,
  tw : Math.random()*Math.PI*2,
  ts : 0.012 + Math.random()*0.028,
}));

// ─── Player ─────────────────────────────────────────────────────────
const P = {
  x:0, y:0, vx:0, vy:0,
  size: PLAYER_START_SIZE,
  spin: 0,
  color: '#aab8cc',
  hue: 210,
  trail: [],
};

// ─── Rank table ─────────────────────────────────────────────────────
const RANKS = [
  { min:0,   max:22,  emoji:'🪨', name:'隕石',          color:'#aaa8a0' },
  { min:22,  max:34,  emoji:'🌑', name:'小惑星',        color:'#b0c4d8' },
  { min:34,  max:50,  emoji:'🌍', name:'地球型惑星',    color:'#4fc3f7' },
  { min:50,  max:68,  emoji:'🪐', name:'ガス惑星',      color:'#ffb347' },
  { min:68,  max:88,  emoji:'⭐', name:'恒星',          color:'#ffe066' },
  { min:88,  max:999, emoji:'⚫', name:'ブラックホール',color:'#c77dff' },
];
function getRank(s) { return RANKS.find(r=>s>=r.min&&s<r.max)||RANKS[RANKS.length-1]; }

// ─── Body pool ───────────────────────────────────────────────────────
// Each body: { x,y,vx,vy, size, hue, spin,spinSpd, kind, craters, ashape, alive }
// kind: 0=asteroid 1=rocky 2=icy 3=earth 4=gas 5=star
let bodies = [];

// Spawn probability: kind 0 is most common, larger kinds are rarer
const KIND_WEIGHTS = [6, 5, 4, 2.5, 1.2, 0.5];
const KIND_SIZE    = [
  [5,  14],   // asteroid
  [10, 22],   // rocky
  [14, 30],   // icy
  [22, 46],   // earth
  [38, 72],   // gas
  [58, 95],   // star
];
function pickKind() {
  const total = KIND_WEIGHTS.reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for (let i=0;i<KIND_WEIGHTS.length;i++) { r-=KIND_WEIGHTS[i]; if(r<=0) return i; }
  return 0;
}
function spawnBody() {
  const kind = pickKind();
  const [sMin,sMax] = KIND_SIZE[kind];
  const size = sMin + Math.random()*(sMax-sMin);

  // Place off-screen edge
  const spread = 1600;
  const side = Math.floor(Math.random()*4);
  const cx = camX+W/2, cy = camY+H/2;
  let x, y;
  if      (side===0) { x=cx+(Math.random()-.5)*spread; y=cy-spread*.5; }
  else if (side===1) { x=cx+(Math.random()-.5)*spread; y=cy+spread*.5; }
  else if (side===2) { x=cx-spread*.5; y=cy+(Math.random()-.5)*spread; }
  else               { x=cx+spread*.5; y=cy+(Math.random()-.5)*spread; }

  // Speed inversely proportional to size
  const topSpd = Math.max(0.12, 0.80 - size*0.007);
  const spd    = (0.2+Math.random()*0.5)*topSpd;
  const ang    = Math.random()*Math.PI*2;
  const hue    = Math.floor(Math.random()*360);

  bodies.push({
    x, y,
    vx: Math.cos(ang)*spd,
    vy: Math.sin(ang)*spd,
    size,
    hue,
    kind,
    spin   : Math.random()*Math.PI*2,
    spinSpd: (Math.random()-.5)*0.022,
    cloudA : Math.random()*Math.PI*2,
    rings  : Math.random()>.5,
    ringTilt: Math.random()*.5+.1,
    // deterministic irregular shape for asteroids
    ashape : Array.from({length:7},()=> .6+Math.random()*.7),
    craters: Array.from({length:3},()=>({
      a: Math.random()*Math.PI*2,
      d: .3+Math.random()*.45,
      r: .09+Math.random()*.18,
    })),
    alive: true,
  });
}

// ─── Draw one celestial body ──────────────────────────────────────────
// ctx is already translated to the body's world position
function drawPlanet(b, playerMode) {
  const s    = b.size;
  const hue  = b.hue;
  const spin = b.spin;
  const kind = playerMode ? getPlayerKind() : b.kind;

  ctx.save();
  ctx.rotate(spin);

  switch(kind) {

    case 0: { // Asteroid — irregular lumpy rock
      if(!b.ashape) b.ashape = Array.from({length:7},()=>.6+Math.random()*.7);
      ctx.beginPath();
      for(let i=0;i<7;i++){
        const a=(i/7)*Math.PI*2;
        const r=s*b.ashape[i];
        if(i===0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
        else      ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
      }
      ctx.closePath();
      const ag = ctx.createRadialGradient(-s*.28,-s*.28,s*.05, 0,0,s*1.1);
      ag.addColorStop(0,'#d0cdc8'); ag.addColorStop(.55,'#78746f'); ag.addColorStop(1,'#303030');
      ctx.fillStyle=ag; ctx.fill();
      for(const c of b.craters){
        const cx2=Math.cos(c.a)*s*c.d, cy2=Math.sin(c.a)*s*c.d;
        ctx.beginPath(); ctx.arc(cx2,cy2,s*c.r,0,Math.PI*2);
        ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fill();
      }
      break;
    }

    case 1: { // Rocky planet — sphere with craters
      ctx.beginPath(); ctx.arc(0,0,s,0,Math.PI*2);
      const rg=ctx.createRadialGradient(-s*.3,-s*.3,s*.08, 0,0,s*1.1);
      rg.addColorStop(0,`hsl(${hue},50%,60%)`);
      rg.addColorStop(.6,`hsl(${hue},40%,35%)`);
      rg.addColorStop(1,'#111');
      ctx.fillStyle=rg; ctx.fill();
      for(const c of b.craters){
        const cx2=Math.cos(c.a)*s*c.d, cy2=Math.sin(c.a)*s*c.d;
        ctx.beginPath(); ctx.arc(cx2,cy2,s*c.r,0,Math.PI*2);
        ctx.fillStyle='rgba(0,0,0,.32)'; ctx.fill();
        ctx.beginPath(); ctx.arc(cx2-s*c.r*.3,cy2-s*c.r*.3,s*c.r*.45,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,.1)'; ctx.fill();
      }
      break;
    }

    case 2: { // Icy — blue-white sheen
      ctx.beginPath(); ctx.arc(0,0,s,0,Math.PI*2);
      const ig=ctx.createRadialGradient(-s*.35,-s*.35,s*.05, 0,0,s*1.1);
      ig.addColorStop(0,'#eaf5ff'); ig.addColorStop(.5,'#a8d8f0'); ig.addColorStop(1,'#2a5070');
      ctx.fillStyle=ig; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=s*.04;
      for(let i=0;i<3;i++){
        const a=b.craters[i].a;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*s*.1, Math.sin(a)*s*.1);
        ctx.lineTo(Math.cos(a+.45)*s*.82, Math.sin(a+.45)*s*.82);
        ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(-s*.3,-s*.3,s*.22,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.22)'; ctx.fill();
      break;
    }

    case 3: { // Earth-like
      // base ocean
      ctx.beginPath(); ctx.arc(0,0,s,0,Math.PI*2);
      const eg=ctx.createRadialGradient(-s*.3,-s*.3,s*.06, 0,0,s*1.05);
      eg.addColorStop(0,'#5ab8ff'); eg.addColorStop(.45,'#2270c0'); eg.addColorStop(1,'#0a2860');
      ctx.fillStyle=eg; ctx.fill();
      // continents — clip inside sphere
      ctx.save();
      ctx.beginPath(); ctx.arc(0,0,s,0,Math.PI*2); ctx.clip();
      const ca=b.cloudA;
      [{a:ca,     rx:.48,ry:.36},
       {a:ca+2.1, rx:.33,ry:.4},
       {a:ca+4.0, rx:.26,ry:.33}].forEach(bl=>{
        ctx.save(); ctx.rotate(bl.a);
        ctx.beginPath(); ctx.ellipse(s*.47,0,s*bl.rx*.58,s*bl.ry*.58,0,0,Math.PI*2);
        ctx.fillStyle='#4a9a50'; ctx.globalAlpha=.82; ctx.fill();
        ctx.restore();
      });
      // cloud wisps
      ctx.globalAlpha=.36; ctx.fillStyle='#fff';
      for(let i=0;i<3;i++){
        const a2=ca+i*2.1+frame*.002;
        ctx.beginPath();
        ctx.arc(Math.cos(a2)*s*.57, Math.sin(a2)*s*.57, s*.17,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
      ctx.globalAlpha=1;
      // atmosphere halo
      ctx.beginPath(); ctx.arc(0,0,s,0,Math.PI*2);
      ctx.strokeStyle='rgba(100,200,255,.28)'; ctx.lineWidth=s*.12; ctx.stroke();
      break;
    }

    case 4: { // Gas giant — horizontal bands + optional rings
      // clip body to circle, draw bands
      ctx.save();
      ctx.beginPath(); ctx.arc(0,0,s,0,Math.PI*2); ctx.clip();
      for(let i=0;i<6;i++){
        const y=-s+i*(s*2/6);
        const l=i%2===0?52:36;
        ctx.fillStyle=`hsl(${hue+i*12},55%,${l}%)`;
        ctx.fillRect(-s,y,s*2,s*2/6+1);
      }
      // storm spot
      ctx.beginPath(); ctx.ellipse(s*.22,s*.08,s*.26,s*.16,.2,0,Math.PI*2);
      ctx.fillStyle=`hsla(${hue+55},70%,65%,.52)`; ctx.fill();
      ctx.restore();
      // rings outside clip
      if(b.rings){
        ctx.save();
        ctx.scale(1, Math.sin(b.ringTilt)*0.38+0.08);
        ctx.beginPath(); ctx.arc(0,0,s*1.52,0,Math.PI*2);
        ctx.strokeStyle=`hsla(${hue},60%,65%,.5)`; ctx.lineWidth=s*.22; ctx.stroke();
        ctx.beginPath(); ctx.arc(0,0,s*1.9,0,Math.PI*2);
        ctx.strokeStyle=`hsla(${hue},50%,60%,.28)`; ctx.lineWidth=s*.11; ctx.stroke();
        ctx.restore();
      }
      break;
    }

    case 5: { // Star — glowing ball with corona + flares
      const pr = s*(1.2+.08*Math.sin(frame*.04+b.cloudA));
      const cg = ctx.createRadialGradient(0,0,s*.65, 0,0,pr*1.5);
      cg.addColorStop(0,`hsla(${hue},80%,65%,.7)`);
      cg.addColorStop(1,`hsla(${hue},80%,65%,0)`);
      ctx.beginPath(); ctx.arc(0,0,pr*1.5,0,Math.PI*2);
      ctx.fillStyle=cg; ctx.fill();
      // surface
      ctx.beginPath(); ctx.arc(0,0,s,0,Math.PI*2);
      const sg=ctx.createRadialGradient(-s*.2,-s*.2,s*.04, 0,0,s);
      sg.addColorStop(0,'#fffce0');
      sg.addColorStop(.4,`hsl(${hue},75%,60%)`);
      sg.addColorStop(1,'#a02800');
      ctx.fillStyle=sg; ctx.fill();
      // solar flares
      for(let i=0;i<4;i++){
        const a=b.cloudA+i*Math.PI/2+frame*.008;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*s*.84, Math.sin(a)*s*.84);
        ctx.quadraticCurveTo(
          Math.cos(a+.4)*s*1.42, Math.sin(a+.4)*s*1.42,
          Math.cos(a+.8)*s*.87,  Math.sin(a+.8)*s*.87);
        ctx.strokeStyle=`hsla(${hue},80%,65%,.55)`; ctx.lineWidth=s*.07; ctx.stroke();
      }
      break;
    }
  }

  ctx.restore();
}

function drawBlackHole(s, spin) {
  ctx.save(); ctx.rotate(spin);
  // accretion disk rings (flattened)
  [[1.45,.30,280,.52],[1.82,.17,310,.35],[2.12,.1,260,.2]].forEach(([r,lw,h,al])=>{
    ctx.save(); ctx.scale(1,.25);
    ctx.beginPath(); ctx.arc(0,0,s*r,0,Math.PI*2);
    ctx.strokeStyle=`hsla(${h},80%,62%,${al})`; ctx.lineWidth=s*lw; ctx.stroke();
    ctx.restore();
  });
  // event horizon
  ctx.beginPath(); ctx.arc(0,0,s,0,Math.PI*2);
  ctx.fillStyle='#000'; ctx.fill();
  // photon ring glow
  const pg=ctx.createRadialGradient(0,0,s*.88, 0,0,s*1.38);
  pg.addColorStop(0,'rgba(190,110,255,.65)');
  pg.addColorStop(1,'rgba(190,110,255,0)');
  ctx.beginPath(); ctx.arc(0,0,s*1.38,0,Math.PI*2);
  ctx.fillStyle=pg; ctx.fill();
  ctx.restore();
}

function getPlayerKind() {
  const s=P.size;
  if(s<22)  return 0; // asteroid
  if(s<34)  return 1; // rocky
  if(s<50)  return 3; // earth
  if(s<68)  return 4; // gas
  return 5;           // star (before BH)
}

// ─── Particles ───────────────────────────────────────────────────────
let particles = [];
function burst(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, spd=1+Math.random()*4;
    particles.push({x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      r:1.5+Math.random()*3.5, alpha:1, color});
  }
}

// ─── Input (virtual joystick) ─────────────────────────────────────────
const jBase=document.getElementById('jBase');
const jKnob=document.getElementById('jKnob');
const JR=44;
let jt={on:false, ox:0,oy:0, dx:0,dy:0};

function jUpdate(){
  if(!jt.on){jBase.style.display='none';return;}
  jBase.style.display='block';
  jBase.style.left  =(jt.ox-54)+'px';
  jBase.style.bottom=(H-jt.oy-54)+'px';
  jBase.style.transform='none';
  const len=Math.sqrt(jt.dx*jt.dx+jt.dy*jt.dy);
  const cl=Math.min(len,JR);
  const nx=len>0?jt.dx/len:0, ny=len>0?jt.dy/len:0;
  jKnob.style.left =(54+nx*cl)+'px';
  jKnob.style.top  =(54+ny*cl)+'px';
  jKnob.style.transform='translate(-50%,-50%)';
}

const jZone=document.getElementById('jZone');
jZone.addEventListener('touchstart',e=>{
  if(mode!=='play') return;
  const t=e.touches[0], rc=wrap.getBoundingClientRect();
  jt.on=true; jt.ox=t.clientX-rc.left; jt.oy=t.clientY-rc.top; jt.dx=0; jt.dy=0;
  e.preventDefault();
},{passive:false});
jZone.addEventListener('touchmove',e=>{
  if(!jt.on) return;
  const t=e.touches[0], rc=wrap.getBoundingClientRect();
  jt.dx=t.clientX-rc.left-jt.ox; jt.dy=t.clientY-rc.top-jt.oy;
  jUpdate(); e.preventDefault();
},{passive:false});
jZone.addEventListener('touchend',()=>{ jt.on=false;jt.dx=0;jt.dy=0;jUpdate(); },{passive:false});

let mdown=false;
jZone.addEventListener('mousedown',e=>{
  if(mode!=='play') return;
  mdown=true;
  const rc=wrap.getBoundingClientRect();
  jt.on=true; jt.ox=e.clientX-rc.left; jt.oy=e.clientY-rc.top; jt.dx=0;jt.dy=0;
});
window.addEventListener('mousemove',e=>{
  if(!mdown) return;
  const rc=wrap.getBoundingClientRect();
  jt.dx=e.clientX-rc.left-jt.ox; jt.dy=e.clientY-rc.top-jt.oy; jUpdate();
});
window.addEventListener('mouseup',()=>{ mdown=false;jt.on=false;jt.dx=0;jt.dy=0;jUpdate(); });

// ─── Update ───────────────────────────────────────────────────────────
function update(){
  frame++;

  // Maintain body count — fill up with more small bodies
  if(frame%22===0 && bodies.length<MAX_BODIES) spawnBody();
  while(bodies.length < 24) spawnBody();

  // Player velocity
  const topSpd = Math.max(1.4, 3.2-P.size*.014);
  if(jt.on){
    const len=Math.sqrt(jt.dx*jt.dx+jt.dy*jt.dy);
    if(len>8){
      const fac=Math.min(len/JR,1);
      P.vx += (jt.dx/len)*topSpd*fac*.26;
      P.vy += (jt.dy/len)*topSpd*fac*.26;
    }
  }
  P.vx*=.88; P.vy*=.88;
  const pspd=Math.sqrt(P.vx*P.vx+P.vy*P.vy);
  if(pspd>topSpd){ P.vx=P.vx/pspd*topSpd; P.vy=P.vy/pspd*topSpd; }
  P.x+=P.vx; P.y+=P.vy;
  P.spin+=.013;
  if(P.x<-WORLD_BOUND){P.x=-WORLD_BOUND;P.vx=Math.abs(P.vx);}
  if(P.x>WORLD_BOUND) {P.x=WORLD_BOUND; P.vx=-Math.abs(P.vx);}
  if(P.y<-WORLD_BOUND){P.y=-WORLD_BOUND;P.vy=Math.abs(P.vy);}
  if(P.y>WORLD_BOUND) {P.y=WORLD_BOUND; P.vy=-Math.abs(P.vy);}
  camX=P.x; camY=P.y;

  // Bodies
  for(const b of bodies){
    if(!b.alive) continue;
    b.spin+=b.spinSpd;
    const dx=P.x-b.x, dy=P.y-b.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const bTopSpd=Math.max(.12, .78-b.size*.008);
    if(dist<400){
      if(b.size>P.size*1.1){
        // chase — bigger = weaker force (lazy giants)
        const f=Math.max(.003, .018*(1-b.size/200));
        b.vx+=(dx/dist)*f; b.vy+=(dy/dist)*f;
      } else if(b.size<P.size*.9){
        b.vx-=(dx/dist)*.022; b.vy-=(dy/dist)*.022;
      }
    }
    b.vx+=(Math.random()-.5)*.045;
    b.vy+=(Math.random()-.5)*.045;
    const bs=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    if(bs>bTopSpd){ b.vx=b.vx/bs*bTopSpd; b.vy=b.vy/bs*bTopSpd; }
    b.x+=b.vx; b.y+=b.vy;
    // cull far off-screen
    const sx=b.x-camX+W/2, sy=b.y-camY+H/2;
    if(sx<-400||sx>W+400||sy<-400||sy>H+400) b.alive=false;
  }
  bodies=bodies.filter(b=>b.alive);

  // Collision
  for(const b of bodies){
    if(!b.alive) continue;
    const dx=P.x-b.x, dy=P.y-b.y;
    if(Math.sqrt(dx*dx+dy*dy) < P.size*.88+b.size*.88){
      if(P.size>b.size*1.05){
        b.alive=false;
        score+=Math.ceil(b.size);
        P.size=Math.min(PLAYER_MAX_SIZE, P.size+b.size*.18);
        burst(b.x-camX+W/2, b.y-camY+H/2, `hsl(${b.hue},70%,60%)`, 12);
        refreshHUD();
        if(P.size>=PLAYER_MAX_SIZE*.92){ endGame('win'); return; }
      } else if(b.size>P.size*1.05){
        burst(W/2,H/2,P.color,20);
        endGame('over'); return;
      }
    }
  }

  // Particles
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vx*=.93; p.vy*=.93; p.alpha-=.02;
  }
  particles=particles.filter(p=>p.alpha>0);
}

// ─── Render ───────────────────────────────────────────────────────────
function render(){
  // Background
  ctx.fillStyle='#00000e'; ctx.fillRect(0,0,W,H);
  // Nebula
  const ng=ctx.createRadialGradient(W*.5,H*.44,8, W*.5,H*.44,W*.72);
  ng.addColorStop(0,'rgba(50,15,95,.1)');
  ng.addColorStop(.5,'rgba(15,5,50,.06)');
  ng.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ng; ctx.fillRect(0,0,W,H);
  // Stars
  for(const s of STARS){
    s.tw+=s.ts;
    ctx.globalAlpha=s.a*(.65+.35*Math.sin(s.tw));
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.arc(
      ((s.x-camX*.07)%W+W)%W,
      ((s.y-camY*.07)%H+H)%H,
      s.r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;

  // World transform
  ctx.save();
  ctx.translate(W/2-camX, H/2-camY);

  // Player trail
  P.trail.push({x:P.x,y:P.y});
  if(P.trail.length>16) P.trail.shift();
  for(let i=0;i<P.trail.length;i++){
    const t=P.trail[i], al=(i/P.trail.length)*.12;
    ctx.beginPath();
    ctx.arc(t.x,t.y, P.size*.35*(i/P.trail.length),0,Math.PI*2);
    ctx.fillStyle=`rgba(110,200,255,${al})`; ctx.fill();
  }

  // Bodies (draw small first so big ones appear on top)
  const sorted=[...bodies].sort((a,b)=>a.size-b.size);
  for(const b of sorted){
    if(!b.alive) continue;
    // Danger aura
    if(b.size>P.size*1.15){
      const dx=P.x-b.x, dy=P.y-b.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<320){
        ctx.save(); ctx.globalAlpha=.08*(1-dist/320);
        ctx.beginPath(); ctx.arc(b.x,b.y,b.size*2.8,0,Math.PI*2);
        ctx.fillStyle='#f46'; ctx.fill(); ctx.restore();
      }
    }
    // Draw body
    ctx.save(); ctx.translate(b.x,b.y);
    drawPlanet(b, false);
    ctx.restore();
    // Edible indicator
    if(b.size<P.size*.85){
      ctx.save(); ctx.globalAlpha=.65;
      ctx.fillStyle='#9f7';
      ctx.font=`${Math.max(9,b.size*.72)}px sans-serif`;
      ctx.textAlign='center';
      ctx.fillText('▼',b.x,b.y-b.size-5);
      ctx.restore();
    }
  }

  // Player
  ctx.save(); ctx.translate(P.x,P.y);
  if(P.size>=88){
    drawBlackHole(P.size, P.spin);
  } else {
    const pb={
      size:P.size, hue:P.hue, spin:P.spin,
      cloudA:frame*.009, rings:P.size>=50&&P.size<68,
      ringTilt:.35, ashape:P.ashape||(P.ashape=Array.from({length:7},()=>.65+Math.random()*.7)),
      craters:[{a:.5,d:.42,r:.13},{a:2.1,d:.5,r:.11},{a:4.2,d:.35,r:.16}],
    };
    drawPlanet(pb, true);
  }
  // Player glow
  ctx.beginPath(); ctx.arc(0,0,P.size*1.3,0,Math.PI*2);
  const plg=ctx.createRadialGradient(0,0,P.size*.8, 0,0,P.size*1.45);
  plg.addColorStop(0,'rgba(110,200,255,0)');
  plg.addColorStop(1,'rgba(110,200,255,.15)');
  ctx.fillStyle=plg; ctx.fill();
  ctx.restore();

  ctx.restore(); // end world transform

  // Particles (screen space)
  ctx.save();
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.alpha);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill();
  }
  ctx.restore();
}

// ─── HUD ─────────────────────────────────────────────────────────────
function refreshHUD(){
  document.getElementById('scoreNum').textContent=score;
  const pct=((P.size-PLAYER_START_SIZE)/(PLAYER_MAX_SIZE*.92-PLAYER_START_SIZE))*100;
  document.getElementById('barFill').style.width=Math.max(5,pct)+'%';
  const rk=getRank(P.size);
  const el=document.getElementById('rankLabel');
  el.textContent=rk.emoji+' '+rk.name;
  el.style.color=rk.color;
  P.color=rk.color;
  P.hue=parseInt(rk.color.replace('#','').slice(0,2),16)%360||210;
}

// ─── Game lifecycle ───────────────────────────────────────────────────
function startGame(){
  mode='play'; score=0; bodies=[]; particles=[];
  Object.assign(P,{x:0,y:0,vx:0,vy:0,size:PLAYER_START_SIZE,spin:0,trail:[],color:'#aab8cc',hue:210,ashape:null});
  frame=0; camX=0; camY=0;
  jt.on=false; jt.dx=0; jt.dy=0;
  for(let i=0;i<26;i++) spawnBody();
  document.getElementById('scStart').style.display='none';
  document.getElementById('scOver').classList.add('hide');
  document.getElementById('scWin').classList.add('hide');
  document.getElementById('hud').style.display='flex';
  refreshHUD();
}
function endGame(type){
  mode=type;
  if(type==='over'){
    document.getElementById('overScore').textContent=score;
    document.getElementById('scOver').classList.remove('hide');
  } else {
    document.getElementById('winScore').textContent=score;
    document.getElementById('scWin').classList.remove('hide');
  }
}

document.getElementById('btnStart').addEventListener('click',startGame);
document.getElementById('btnRetry').addEventListener('click',startGame);
document.getElementById('btnWin').addEventListener('click',startGame);

// ─── Main loop ────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  if(mode==='play'){ update(); render(); }
  else render(); // still render the star background
}
loop();
</script>
